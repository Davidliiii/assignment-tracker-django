<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Assignment Tracker{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
            color: #333;
        }

        nav {
            background-color: #1f4e79;
            padding: 15px 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        h1, h2, h3 {
            color: #1f4e79;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: #f9fafb;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        a {
            color: #1f4e79;
            text-decoration: none;
            margin-right: 10px;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            background-color: #1f4e79;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #163a5c;
        }

        form p {
            margin-bottom: 15px;
        }

        input, textarea, select {
            width: 100%;
            max-width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .top-links {
            margin-bottom: 20px;
        }

        .filter-box {
            background: #f9fafb;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .filter-box label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        .filter-box input,
        .filter-box select {
            width: 100%;
            margin-top: 5px;
            margin-bottom: 12px;
        }

        .inline-links {
            margin-top: 10px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .dashboard-card {
            background: #eef4f8;
            border: 1px solid #d5e2ec;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .dashboard-card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        .dashboard-card p {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        .section-box {
            background: #f9fafb;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'assignment_list' %}">Assignments</a>
        <a href="{% url 'course_list' %}">Courses</a>
        <a href="{% url 'tag_list' %}">Tags</a>
        <a href="/admin/">Admin</a>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
