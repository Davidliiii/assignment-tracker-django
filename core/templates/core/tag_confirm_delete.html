{% extends 'core/base.html' %}

{% block title %}Delete Tag{% endblock %}

{% block content %}
<h1>Delete Tag</h1>

<p>Are you sure you want to delete "<strong>{{ tag.name }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<p><a href="{% url 'tag_list' %}">Cancel</a></p>
{% endblock %}
